components:
  schemas:
    LLMProvider:
      type: string
      enum:
        - local
        - openai
        - anthropic
        - azure
        - gcp
        - openrouter
        - huggingface
        - custom_http
      description: Supported LLM provider identifiers.
    LLMConfig:
      type: object
      properties:
        provider:
          $ref: "#/components/schemas/LLMProvider"
        model:
          type: string
        apiKeyRef:
          type: string
        endpoint:
          type: string
        extra:
          type: object
      required:
        - provider
        - model
      additionalProperties: false
      description: "LLM configuration: provider, model, optional API key ref, endpoint, and extra options."
    CanvasPosition:
      type: array
      minItems: 2
      items:
        - type: number
          title: x
        - type: number
          title: y
      maxItems: 2
      description: [x, y] position of a node on the canvas.
    NodeTransform:
      type: object
      properties:
        type:
          type: string
          enum:
            - expression
            - passthrough
        expression:
          type: string
          description: "Template: {{ $input }} is replaced with JSON.stringify(input)."
      additionalProperties: false
      description: Transform configuration for input/output nodes. Supports {{ $input }} template.
    CanvasNode:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        name:
          type: string
        position:
          $ref: "#/components/schemas/CanvasPosition"
        parameters:
          type: object
          description: Node-specific parameters (replaces legacy config for canvas-relevant fields)
      required:
        - id
        - type
        - position
      additionalProperties: false
      description: "A single node in a canvas graph: id, type, position, optional name and parameters."
    EdgeCondition:
      anyOf:
        - type: object
          properties:
          type:
          type: string
          const: message_type
          description: "\"message_type\": last message role or type must equal value."
          value:
          type: string
          required:
          - type
          - value
          additionalProperties: false
        - type: object
          properties:
          type:
          type: string
          const: content_contains
          description: "\"content_contains\": last output/message content must include value (case-insensitive)."
          value:
          type: string
          required:
          - type
          - value
          additionalProperties: false
      description: Optional condition for conditional edges (e.g. steer by last message type or content).
    CanvasEdge:
      type: object
      properties:
        id:
          type: string
        source:
          type: string
        target:
          type: string
        from:
          type: string
          description: Optional aliases for source/target (e.g. React Flow style).
        to:
          type: string
        condition:
          $ref: "#/components/schemas/EdgeCondition"
      required:
        - id
        - source
        - target
      additionalProperties: false
      description: Directed edge between two nodes; optional condition for conditional branching.
    Canvas:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/CanvasNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/CanvasEdge"
      required:
        - nodes
        - edges
      additionalProperties: false
      description: "Unified canvas structure: nodes and edges. Single source of truth for agent/workflow graphs."
    AgentKind:
      type: string
      enum:
        - node
        - code
      description: "Agent implementation kind: graph-based (node) or code-based (script)."
    AgentType:
      type: string
      enum:
        - internal
        - external
      description: Whether the agent is internal (Studio-managed) or external (e.g. remote MCP).
    AgentProtocol:
      type: string
      enum:
        - mcp
        - http
        - native
      description: "Protocol used to invoke the agent: native (in-process), HTTP, or MCP."
    ScopeConfig:
      type: object
      properties:
        name:
          type: string
        allowed:
          type: boolean
        description:
          type: string
      required:
        - name
        - allowed
      additionalProperties: false
      description: "Scope permission: name, whether allowed, optional description."
    Agent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        kind:
          $ref: "#/components/schemas/AgentKind"
        type:
          $ref: "#/components/schemas/AgentType"
        protocol:
          $ref: "#/components/schemas/AgentProtocol"
        endpoint:
          type: string
        agentKey:
          type: string
        capabilities:
          type: array
          items:
            type: string
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/ScopeConfig"
        llmConfig:
          $ref: "#/components/schemas/LLMConfig"
        ragCollectionId:
          type:
            - string
            - null
          description: "RAG: null/undefined = use studio (deployment) collection; set = use this collection for agent context"
      required:
        - id
        - name
        - kind
        - type
        - protocol
        - capabilities
        - scopes
      additionalProperties: false
      description: "Agent entity: identity, kind, protocol, capabilities, and optional LLM/RAG config. Stored in DB and used by API and runtime for execution and listing."
    NodeAgentDefinition:
      type: object
      properties:
        graph:
          $ref: "#/components/schemas/Canvas"
        sharedContextKeys:
          type: array
          items:
            type: string
        defaultLlmConfigId:
          type: string
          description: Default LLM config ID for nodes that don't specify llmConfigId. Resolved from llm_configs table.
        toolIds:
          type: array
          items:
            type: string
          description: Tool IDs for legacy llm nodes with decision layer. Prefer "decision" node type for per-node config.
      required:
        - graph
        - sharedContextKeys
      additionalProperties: false
      description: "Definition for a node (graph) agent: canvas graph, shared context keys, and optional default LLM/tool config. Resolved at runtime when running the agent's graph."
    CodeAgent:
      type: object
      properties:
        source:
          type: string
        entrypoint:
          type: string
      required:
        - source
        - entrypoint
      additionalProperties: false
      description: "Definition for a code agent: source code and entrypoint (e.g. default export or main)."
    ToolOverride:
      type: object
      properties:
        config:
          type: object
        name:
          type: string
      additionalProperties: false
      description: "Per-node override for a tool: agent-specific config/schema/name without changing the library tool."
    AgentExecutionContext:
      type: object
      properties:
        sharedContext:
          type: object
        callTool:
          $comment: "(toolId: string, input: unknown, override?: ToolOverride) => Promise<unknown>"
          type: object
          properties:
            namedArgs:
              type: object
              properties:
                toolId:
                  type: string
                override:
                  $ref: "#/components/schemas/ToolOverride"
              required:
                - toolId
                - input
              additionalProperties: false
        callLLM:
          $comment: "(input: unknown) => Promise<unknown>"
          type: object
          properties:
            namedArgs:
              type: object
              properties:

              required:
                - input
              additionalProperties: false
          description: callLLM accepts { llmConfigId?, messages, tools? }. llmConfigId selects which LLM to use (per-node). Returns LLMResponse when tools provided, else content string.
        buildToolsForIds:
          $comment: |
            (toolIds: string[]) => Promise<
                Array<{
                  type: "function";
                  function: { name: string; description: string; parameters: Record<string, unknown> };
                }>
              >
          type: object
          properties:
            namedArgs:
              type: object
              properties:
                toolIds:
                  type: array
                  items:
                    type: string
              required:
                - toolIds
              additionalProperties: false
          description: Build tool definitions for given tool IDs. Used by decision nodes.
        availableTools:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                const: function
              function:
                type: object
                properties:
                  name:
                    type: string
                  description:
                    type: string
                  parameters:
                    type: object
                required:
                  - name
                  - description
                  - parameters
                additionalProperties: false
            required:
              - type
              - function
            additionalProperties: false
          description: Cached tool definitions (legacy). Prefer buildToolsForIds for per-node tools.
        ragBlock:
          type: string
          description: Optional workflow/RAG block to prepend to user message (workflow runner sets this).
        toolInstructionsBlock:
          type: string
          description: Optional tool instructions block to prepend to user message (workflow runner sets this).
      required:
        - sharedContext
        - callTool
        - callLLM
      additionalProperties: false
      description: Execution context passed to node agents and workflow node handlers. Provides shared context, callTool, callLLM, and optional tool definitions / RAG/tool instruction blocks.
    ChatRole:
      type: string
      enum:
        - user
        - assistant
        - tool
      description: "Role of a chat message: user, assistant, or tool (tool result)."
    ChatToolCall:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        arguments:
          type: object
      required:
        - id
        - name
        - arguments
      additionalProperties: false
      description: "A single tool call in a message: id, name, arguments, optional result."
    LLMTraceCall:
      type: object
      properties:
        phase:
          type: string
          description: e.g. "main" | "rephrase" | "nudge" | "follow_up"
        messageCount:
          type: number
          description: Number of messages in the request.
        lastUserContent:
          type: string
          description: Last user message (truncated) for context.
        requestMessages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              content:
                type: string
            required:
              - role
              - content
            additionalProperties: false
          description: Full request messages (optional, can be large).
        responseContent:
          type: string
          description: Model response content (full or truncated for storage).
        responsePreview:
          type: string
          description: First N chars of response for preview.
        usage:
          type: object
          properties:
            promptTokens:
              type: number
            completionTokens:
              type: number
            totalTokens:
              type: number
          additionalProperties: false
          description: Token usage if available.
      additionalProperties: false
      description: "One LLM call: request summary and response for stack trace."
    ChatMessage:
      type: object
      properties:
        id:
          type: string
        role:
          $ref: "#/components/schemas/ChatRole"
        content:
          type: string
        toolCalls:
          type: array
          items:
            $ref: "#/components/schemas/ChatToolCall"
        llmTrace:
          type: array
          items:
            $ref: "#/components/schemas/LLMTraceCall"
          description: LLM request/response trace for this message (assistant only).
        rephrasedPrompt:
          type:
            - string
            - null
          description: Rephrased user intent for this turn (assistant only; shown in UI and trace).
        createdAt:
          type: number
        conversationId:
          type: string
      required:
        - id
        - role
        - content
        - createdAt
      additionalProperties: false
      description: "A single chat message: role, content, optional tool calls and LLM trace."
    Conversation:
      type: object
      properties:
        id:
          type: string
        title:
          type:
            - string
            - null
        rating:
          type:
            - number
            - null
        note:
          type:
            - string
            - null
        summary:
          type:
            - string
            - null
        lastUsedProvider:
          type:
            - string
            - null
        lastUsedModel:
          type:
            - string
            - null
        createdAt:
          type: number
      required:
        - id
        - title
        - rating
        - note
        - summary
        - lastUsedProvider
        - lastUsedModel
        - createdAt
      additionalProperties: false
      description: "Conversation metadata: id, title, rating, summary, and last-used LLM."
    ChatAssistantSettings:
      type: object
      properties:
        id:
          type: string
        customSystemPrompt:
          type:
            - string
            - null
        contextAgentIds:
          anyOf:
            - type: array
              items:
              type: string
            - type: null
        contextWorkflowIds:
          anyOf:
            - type: array
              items:
              type: string
            - type: null
        contextToolIds:
          anyOf:
            - type: array
              items:
              type: string
            - type: null
        recentSummariesCount:
          type:
            - number
            - null
          description: How many recent conversation summaries to include in context (1–10). Default 3.
        temperature:
          type:
            - number
            - null
          description: LLM temperature (0–2). Null = use default 0.7. Some models only support 1.
        historyCompressAfter:
          type:
            - number
            - null
          description: When conversation history exceeds this many messages, older messages are summarized. Default 24.
        historyKeepRecent:
          type:
            - number
            - null
          description: When compressing, keep this many most recent messages in full. Default 16. Must be less than historyCompressAfter.
        plannerRecentMessages:
          type:
            - number
            - null
          description: Number of past messages to include in recent conversation for the planner (heap mode). Default 12.
        ragRetrieveLimit:
          type:
            - number
            - null
          description: Override for RAG retrieve limit (chunks) for studio chat. Null = use system default.
        feedbackLastN:
          type:
            - number
            - null
          description: "Fallback: how many feedback items to use when not using similarity (last N by time)."
        feedbackRetrieveCap:
          type:
            - number
            - null
          description: When using similarity, max number of feedback items to retrieve.
        feedbackMinScore:
          type:
            - number
            - null
          description: Optional minimum similarity score (0–1) for retrieved feedback.
        updatedAt:
          type: number
      required:
        - id
        - customSystemPrompt
        - contextAgentIds
        - contextWorkflowIds
        - contextToolIds
        - recentSummariesCount
        - temperature
        - historyCompressAfter
        - historyKeepRecent
        - plannerRecentMessages
        - ragRetrieveLimit
        - feedbackLastN
        - feedbackRetrieveCap
        - feedbackMinScore
        - updatedAt
      additionalProperties: false
    AssistantMemoryEntry:
      type: object
      properties:
        id:
          type: string
        key:
          type:
            - string
            - null
        content:
          type: string
        createdAt:
          type: number
      required:
        - id
        - key
        - content
        - createdAt
      additionalProperties: false
    Feedback:
      type: object
      properties:
        id:
          type: string
        targetType:
          type: string
          enum:
            - agent
            - chat
        targetId:
          type: string
        executionId:
          type: string
        label:
          type: string
          enum:
            - good
            - bad
        notes:
          type: string
        createdAt:
          type: number
      required:
        - id
        - targetType
        - targetId
        - input
        - output
        - label
        - createdAt
      additionalProperties: false
    FileEntry:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        mimeType:
          type: string
        size:
          type: number
        path:
          type: string
        createdAt:
          type: number
      required:
        - id
        - name
        - mimeType
        - size
        - path
        - createdAt
      additionalProperties: false
    CustomFunction:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        language:
          type: string
        source:
          type: string
        sandboxId:
          type: string
        createdAt:
          type: number
      required:
        - id
        - name
        - language
        - source
        - createdAt
      additionalProperties: false
    ExecutionMode:
      type: string
      enum:
        - one_time
        - continuous
        - interval
      description: "When and how the workflow runs: one-time, continuous, or on an interval."
    WorkflowExecutionStep:
      anyOf:
        - type: string
        - type: object
          properties:
          parallel:
          type: array
          items:
          type: string
          required:
          - parallel
          additionalProperties: false
      description: "One step in an explicit execution order: a single node id or a parallel group of node ids. Mirrors the heap's HeapStep structure for leveled DAG execution."
    WorkflowBranch:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/CanvasNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/CanvasEdge"
        maxRounds:
          type:
            - number
            - null
          description: When set with edges, execution follows the graph and stops after this many full cycles.
        schedule:
          type: string
          description: "Schedule for this branch only: interval seconds (e.g. \"60\"), daily@HH:mm, or weekly@0,1,2 (0=Sun)."
        executionMode:
          $ref: "#/components/schemas/ExecutionMode"
        turnInstruction:
          type:
            - string
            - null
          description: Optional turn instruction for agents in this branch.
      required:
        - id
        - nodes
        - edges
      additionalProperties: false
      description: A single graph within a workflow. Can have its own schedule for periodic execution.
    Workflow:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/CanvasNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/CanvasEdge"
        executionMode:
          $ref: "#/components/schemas/ExecutionMode"
        schedule:
          type: string
        maxRounds:
          type:
            - number
            - null
          description: When set with edges, execution follows the graph and stops after this many full cycles (avoids endless loops).
        turnInstruction:
          type:
            - string
            - null
          description: Optional instruction injected at the start of each agent turn (e.g. "Reply directly to what the partner just said."). Set via update_workflow turnInstruction.
        branches:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowBranch"
          description: Multiple disconnected graphs, each with its own schedule. When set, branches run in parallel according to their schedules; main nodes/edges remain for one-time or legacy runs.
        executionOrder:
          anyOf:
            - type: array
              items:
              $ref: "#/components/schemas/WorkflowExecutionStep"
            - type: null
          description: "Optional explicit execution order: array of steps (node id or { parallel: nodeIds }). When set, the engine runs levels in this order with parallel grouping; when omitted, nodes run in array order (one per level). Mirrors heap's priorityOrder structure."
      required:
        - id
        - name
        - nodes
        - edges
        - executionMode
      additionalProperties: false
      description: "Workflow entity: graph (nodes/edges), execution mode, schedule, optional branches and explicit execution order. Stored in DB and consumed by the workflow engine."
    ToolProtocol:
      type: string
      enum:
        - mcp
        - http
        - native
      description: "Protocol used to execute the tool: native (in-process), HTTP, or MCP."
    ToolDefinition:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        protocol:
          $ref: "#/components/schemas/ToolProtocol"
        config:
          type: object
      required:
        - id
        - name
        - protocol
        - config
      additionalProperties: false
      description: "Tool definition: identity, name, protocol, and config/schemas. Stored in DB and passed to the ToolRegistry for execution via the adapter for the tool's protocol."
    PromptTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        arguments:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              required:
                type: boolean
            required:
              - name
            additionalProperties: false
        template:
          type: string
      required:
        - id
        - name
        - template
      additionalProperties: false
    SandboxStatus:
      type: string
      enum:
        - creating
        - running
        - stopped
        - destroyed
    SandboxConfig:
      type: object
      properties:
        memory:
          type: string
        cpus:
          type: number
        network:
          type:
            - boolean
            - string
          description: When true, use default bridge; when a string, use named network (e.g. for Ollama sidecar).
        env:
          type: object
          additionalProperties:
            type: string
        ports:
          type: object
          additionalProperties:
            type: number
        useImageCmd:
          type: boolean
          description: If true, run the image default CMD instead of "sleep infinity". Use for images that run a service (e.g. OpenClaw gateway).
        cmd:
          type: array
          items:
            type: string
          description: Optional command and args (replaces image CMD). Used with useImageCmd to e.g. run "gateway --bind lan".
      additionalProperties: false
    Sandbox:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        image:
          type: string
        status:
          $ref: "#/components/schemas/SandboxStatus"
        containerId:
          type: string
        config:
          $ref: "#/components/schemas/SandboxConfig"
        createdAt:
          type: number
      required:
        - id
        - name
        - image
        - status
        - config
        - createdAt
      additionalProperties: false